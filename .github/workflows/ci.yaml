name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: go test ./... -count=1

  test-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - run: cd ui && npm ci && npm run build

  build-server:
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      REPO_LC: ""
    steps:
      - uses: actions/checkout@v5

      - name: Set lowercase repo
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ env.REPO_LC }}/images/preamp-core
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-ui:
    needs: [test-ui]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      REPO_LC: ""
    steps:
      - uses: actions/checkout@v5

      - name: Set lowercase repo
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ env.REPO_LC }}/images/preamp-ui
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: ./ui
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  helm:
    needs: [test, test-ui]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      chart-version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: azure/setup-helm@v5

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Bump chart version
        id: version
        run: |
          cd chart/preamp
          CURRENT=$(grep '^version:' Chart.yaml | awk '{print $2}')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/^version: .*/version: $NEXT/" Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"$NEXT\"/" Chart.yaml
          echo "CHART_VERSION=$NEXT" >> "$GITHUB_ENV"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Commit and push chart changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chart/preamp/Chart.yaml
          git diff --cached --quiet || git commit -m "chart: bump to $CHART_VERSION"
          git push

      - name: Bake image tags into chart defaults
        run: sed -i "s/tag: latest/tag: sha-${GITHUB_SHA::7}/" chart/preamp/values.yaml

      - name: Package and push chart
        run: |
          helm package chart/preamp
          REPO="${{ github.repository }}"
          helm push preamp-*.tgz "oci://ghcr.io/${REPO,,}/charts"

  notify-rig:
    needs: [build-server, helm]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.RIG_DISPATCH_TOKEN }}
          repository: BenRachmiel/rig
          event-type: subchart-update
          client-payload: '{"source":"preamp","chartVersion":"${{ needs.helm.outputs.chart-version }}"}'
