name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: go test ./... -count=1

  test-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - run: cd ui && npm ci && npm run build

  build-server:
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      REPO_LC: ""
    steps:
      - uses: actions/checkout@v5

      - name: Set lowercase repo
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ env.REPO_LC }}/images/preamp-core
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-ui:
    needs: [test-ui]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      REPO_LC: ""
    steps:
      - uses: actions/checkout@v5

      - name: Set lowercase repo
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ env.REPO_LC }}/images/preamp-ui
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: ./ui
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  helm:
    needs: [test, test-ui]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: azure/setup-helm@v5

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push chart
        run: |
          helm package chart/preamp
          REPO="${{ github.repository }}"
          helm push preamp-*.tgz "oci://ghcr.io/${REPO,,}/charts"

  notify-rig:
    needs: [build-server, helm]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Extract chart version and short SHA
        id: meta
        run: |
          echo "short=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "chart=$(grep '^version:' chart/preamp/Chart.yaml | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.RIG_DISPATCH_TOKEN }}
          repository: BenRachmiel/rig
          event-type: subchart-update
          client-payload: '{"source":"preamp","chartVersion":"${{ steps.meta.outputs.chart }}","imageTag":"${{ steps.meta.outputs.short }}"}'

  update-gitops:
    needs: [build-server, build-ui]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.TALOS_CLUSTER_DEPLOY_KEY }}

      - name: Update image tags in talos-cluster
        run: |
          TAG="sha-${GITHUB_SHA::7}"
          git clone git@github.com:BenRachmiel/talos-cluster.git
          cd talos-cluster
          sed -i "s/tag: sha-[a-f0-9]*/tag: $TAG/g" apps/preamp/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/preamp/values.yaml
          git diff --cached --quiet || git commit -m "preamp: update images to $TAG"
          git push
