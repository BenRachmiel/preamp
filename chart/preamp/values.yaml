image:
  repository: ghcr.io/benrachmiel/preamp/images/preamp-core
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

# -- Core config
config:
  musicDir: /music
  dataDir: /data
  listen: ":4533"
  credentialTTL: "168h"
  collectorTokenEnabled: false  # set true + add PREAMP_COLLECTOR_TOKEN to secret

# -- UI + oauth2-proxy sidecar (set enabled: false to disable the management UI)
ui:
  enabled: true
  image:
    repository: ghcr.io/benrachmiel/preamp/images/preamp-ui
    tag: latest
    pullPolicy: IfNotPresent
  oauthProxy:
    image:
      repository: quay.io/oauth2-proxy/oauth2-proxy
      tag: v7.9.0
    provider: oidc
    issuerURL: ""          # OIDC issuer, required when ui.enabled
    clientID: ""
    # Extra args passed to oauth2-proxy (e.g., --email-domain=*, --allowed-group=...)
    extraArgs: []

# -- Secrets management.
# By default the chart creates a Secret from the values below.
# Set existingSecret to use an externally-managed Secret (e.g. from ESO).
secrets:
  existingSecret: ""
  # Only used when existingSecret is empty:
  encryptionKey: ""
  oidcClientSecret: ""     # required when ui.enabled
  oauthCookieSecret: ""    # required when ui.enabled

# -- When ui.enabled=false, these are required for hardcoded credential access:
devCredentials:
  username: ""   # PREAMP_DEV_USERNAME
  password: ""   # PREAMP_DEV_PASSWORD

service:
  type: ClusterIP
  port: 4533

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: preamp.example.com
  tls: []
  #  - secretName: preamp-tls
  #    hosts:
  #      - preamp.example.com

# -- Gateway API (Cilium, etc.) — use instead of ingress
gateway:
  enabled: false
  host: preamp.example.com
  gatewayName: main-gateway
  gatewayNamespace: kube-system

persistence:
  music:
    # -- Use an existing PVC, or leave empty to create one.
    existingClaim: ""
    storageClass: ""
    accessMode: ReadOnlyMany
    size: 50Gi
  data:
    # -- Use an existing PVC, or leave empty to create one.
    existingClaim: ""
    storageClass: ""
    size: 1Gi

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 512Mi

probes:
  liveness:
    path: /rest/ping
    initialDelaySeconds: 5
    periodSeconds: 30
  readiness:
    path: /rest/ping
    initialDelaySeconds: 2
    periodSeconds: 10

# -- Extra arbitrary manifests to deploy alongside the chart.
# Each entry is templated before apply. Use for ExternalSecret, SecretStore, etc.
extraObjects: []
