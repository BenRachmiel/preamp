{{- if .Values.scrapeArt.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "preamp.fullname" . }}-scrape-art-{{ now | date "20060102-150405" }}
  labels:
    {{- include "preamp.labels" . | nindent 4 }}
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: scrape-art
          image: "{{ .Values.scrapeArt.image.repository }}:{{ .Values.scrapeArt.image.tag }}"
          args:
            {{- toYaml .Values.scrapeArt.args | nindent 12 }}
          volumeMounts:
            - name: music
              mountPath: /music
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: music
          persistentVolumeClaim:
            {{- if .Values.persistence.music.existingClaim }}
            claimName: {{ .Values.persistence.music.existingClaim }}
            {{- else }}
            claimName: {{ include "preamp.fullname" . }}-music
            {{- end }}
        - name: data
          persistentVolumeClaim:
            {{- if .Values.persistence.data.existingClaim }}
            claimName: {{ .Values.persistence.data.existingClaim }}
            {{- else }}
            claimName: {{ include "preamp.fullname" . }}-data
            {{- end }}
{{- end }}
