{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "preamp.fullname" . }}
  labels:
    {{- include "preamp.labels" . | nindent 4 }}
spec:
  hostnames:
    - {{ .Values.gateway.host }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gateway.gatewayName }}
      namespace: {{ .Values.gateway.gatewayNamespace }}
  rules:
    - backendRefs:
        - kind: Service
          name: {{ include "preamp.fullname" . }}
          port: {{ .Values.service.port }}
      matches:
        - path:
            type: PathPrefix
            value: /rest/
    {{- if .Values.ui.enabled }}
    - backendRefs:
        - kind: Service
          name: {{ include "preamp.fullname" . }}
          port: 4180
      matches:
        - path:
            type: PathPrefix
            value: /
    {{- end }}
{{- end }}
