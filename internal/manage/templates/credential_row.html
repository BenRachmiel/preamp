{{define "credential_row"}}
<tr id="cred-{{.ID}}">
  <td>{{.ClientName}}</td>
  <td>
    {{if .LegacyAuth}}<span class="badge badge-legacy">legacy</span>
    {{else}}<span class="badge badge-api">apiKey</span>
    {{end}}
  </td>
  <td>{{.CreatedAt}}</td>
  <td>
    {{if .Expired}}<span class="badge badge-expired">expired</span>
    {{else}}{{.ExpiresAt}}
    {{end}}
  </td>
  <td class="actions">
    <button class="secondary"
      hx-post="/manage/credentials/{{.ID}}/renew"
      hx-target="#cred-{{.ID}}"
      hx-swap="outerHTML">Renew</button>
    <button class="danger"
      hx-delete="/manage/credentials/{{.ID}}"
      hx-target="#cred-{{.ID}}"
      hx-swap="outerHTML"
      hx-confirm="Revoke this credential? The client will be disconnected.">Revoke</button>
  </td>
</tr>
{{end}}
