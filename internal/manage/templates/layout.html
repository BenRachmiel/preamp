<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>preamp — manage</title>
<script src="/manage/static/htmx.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f0f0f;color:#e0e0e0;line-height:1.5;padding:2rem;max-width:48rem;margin:0 auto}
h1{font-size:1.5rem;margin-bottom:1.5rem;color:#fff}
h2{font-size:1.1rem;margin-bottom:1rem;color:#ccc}
a{color:#6ea8fe}
table{width:100%;border-collapse:collapse;margin-bottom:1.5rem}
th,td{padding:.5rem .75rem;text-align:left;border-bottom:1px solid #2a2a2a}
th{color:#888;font-weight:500;font-size:.85rem;text-transform:uppercase;letter-spacing:.05em}
.badge{display:inline-block;padding:.1rem .5rem;border-radius:.25rem;font-size:.75rem;font-weight:600}
.badge-api{background:#1a3a1a;color:#4ade80}
.badge-legacy{background:#3a2a1a;color:#fbbf24}
.badge-expired{background:#3a1a1a;color:#f87171}
form{margin-bottom:1.5rem}
label{display:block;font-size:.85rem;color:#999;margin-bottom:.25rem}
input[type=text],input[type=password]{background:#1a1a1a;border:1px solid #333;color:#e0e0e0;padding:.4rem .6rem;border-radius:.25rem;width:100%;margin-bottom:.75rem;font-size:.9rem}
input[type=text]:focus,input[type=password]:focus{outline:none;border-color:#6ea8fe}
button{background:#2563eb;color:#fff;border:none;padding:.4rem 1rem;border-radius:.25rem;cursor:pointer;font-size:.85rem}
button:hover{background:#1d4ed8}
button.danger{background:#991b1b}
button.danger:hover{background:#7f1d1d}
button.secondary{background:#333}
button.secondary:hover{background:#444}
.checkbox-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem}
.checkbox-row input{width:auto;margin:0}
.checkbox-row label{margin:0;display:inline}
.secret-card{background:#1a2a1a;border:1px solid #2a4a2a;padding:1rem;border-radius:.5rem;margin-bottom:1rem}
.secret-card code{background:#0a1a0a;padding:.2rem .5rem;border-radius:.25rem;font-size:.9rem;word-break:break-all;display:block;margin:.5rem 0}
.secret-card .warn{color:#fbbf24;font-size:.8rem}
.actions{display:flex;gap:.5rem}
.form-row{display:flex;gap:.75rem;align-items:end}
.form-row>div{flex:1}
.form-row button{margin-bottom:.75rem}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.error{color:#f87171;margin-bottom:1rem}
</style>
</head>
<body>
{{block "content" .}}{{end}}
</body>
</html>
