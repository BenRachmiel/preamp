{{define "content"}}
<div class="header">
  <h1>preamp — credentials</h1>
  <form method="POST" action="/manage/logout">
    <button class="secondary" type="submit">Logout</button>
  </form>
</div>

<h2>New Credential</h2>
<form hx-post="/manage/credentials" hx-target="#new-credential-result" hx-swap="innerHTML">
  <div class="form-row">
    <div>
      <label for="client_name">Client Name</label>
      <input type="text" id="client_name" name="client_name" placeholder="e.g. Symfonium" required>
    </div>
    <div>
      <label for="ttl">TTL</label>
      <select id="ttl" name="ttl">
        <option value="24h">1 day</option>
        <option value="72h">3 days</option>
        <option value="168h" selected>7 days</option>
        <option value="720h">30 days</option>
        <option value="2160h">90 days</option>
        <option value="0">No expiry</option>
      </select>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="legacy_auth" name="legacy_auth" value="1">
      <label for="legacy_auth">Enable legacy (token/password) auth</label>
    </div>
    <button type="submit">Mint Credential</button>
  </div>
</form>
<div id="new-credential-result"></div>

<h2>Active Credentials</h2>
<table>
  <thead>
    <tr>
      <th>Client</th>
      <th>Type</th>
      <th>Created</th>
      <th>Expires</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="credential-list">
    {{range .Credentials}}
    {{template "credential_row" .}}
    {{else}}
    <tr><td colspan="5" style="color:#666">No credentials yet. Mint one above.</td></tr>
    {{end}}
  </tbody>
</table>
{{end}}
